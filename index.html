<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>夸夸星电波 · 天线泡泡 (千禧经典版)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1) 0%, transparent 60%);
            transition: background 0.2s ease;
        }

        /* 主卡片 —— 星穹铁道风格圆角+玻璃质感 */
        .radio-card {
            max-width: 420px;
            width: 100%;
            background: rgba(22, 28, 46, 0.75);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(150, 190, 255, 0.25);
            border-radius: 42px;
            padding: 28px 22px;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(210, 230, 255, 0.2) inset;
            color: #f0f3ff;
        }

        /* 品牌区 */
        .brand {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .brand-primary {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd7b0, #c0e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #7ea5ff66;
        }
        .brand-series {
            font-size: 1.1rem;
            color: #aac8ff;
            background: rgba(16, 30, 58, 0.6);
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid #7b9eff55;
            backdrop-filter: blur(4px);
        }

        /* 交互区域 */
        .section-title {
            font-size: 1.05rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0 14px 0;
            color: #bbd6ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title span {
            background: #2e3f66;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.8rem;
            color: #d3e2ff;
        }

        .mbti-input-area {
            background: rgba(8, 18, 36, 0.7);
            border-radius: 40px;
            padding: 8px 8px 8px 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            border: 1px solid #4065b055;
            margin-bottom: 12px;
        }
        .mbti-input-area input {
            flex: 2 1 150px;
            background: transparent;
            border: none;
            padding: 14px 6px;
            font-size: 1.1rem;
            color: #fff;
            outline: none;
            min-width: 130px;
        }
        .mbti-input-area input::placeholder {
            color: #7f99cc;
            font-size: 0.95rem;
        }
        .mbti-input-area button {
            background: linear-gradient(145deg, #4b6eb0, #253a6b);
            border: none;
            padding: 12px 26px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            font-size: 1rem;
            box-shadow: 0 5px 0 #121f3a, 0 6px 14px #00000080;
            cursor: pointer;
            transition: 0.07s ease;
            border: 1px solid #88adff;
        }
        .mbti-input-area button:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #121f3a, 0 6px 12px #00000060;
        }

        .icon-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 16px 0 8px;
        }
        .mbti-icon {
            background: rgba(16, 28, 48, 0.8);
            border: 1px solid #577bce;
            color: #c7dbff;
            width: 48px;
            height: 48px;
            border-radius: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.1s ease;
            backdrop-filter: blur(6px);
        }
        .mbti-icon.selected {
            background: #3f60a5;
            color: white;
            border-color: #b1d0ff;
            box-shadow: 0 0 12px #6190ff;
        }

        .switch-mode {
            text-align: center;
            margin: 18px 0 10px;
        }
        .switch-mode a {
            color: #aac3ff;
            text-decoration: underline 1px dotted;
            font-size: 0.95rem;
            cursor: pointer;
            padding: 8px 16px;
            display: inline-block;
        }

        /* 12题测试卡片 */
        .mini-test {
            background: rgba(6, 15, 30, 0.6);
            border-radius: 34px;
            padding: 22px 18px;
            border: 1px solid #4d71b0;
            margin: 20px 0;
            max-height: 450px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #4d71b0 #0e1a2c;
        }
        .mini-test::-webkit-scrollbar {
            width: 5px;
        }
        .mini-test::-webkit-scrollbar-track {
            background: #0e1a2c;
        }
        .mini-test::-webkit-scrollbar-thumb {
            background: #4d71b0;
            border-radius: 10px;
        }
        .question {
            margin: 18px 0;
        }
        .question p {
            margin-bottom: 12px;
            font-weight: 400;
            color: #c6d6ff;
        }
        .options {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .options button {
            background: #1d2c4a;
            border: 1px solid #5c7ec9;
            color: #dfebff;
            padding: 12px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            flex: 1 0 auto;
            cursor: pointer;
            transition: 0.1s;
            min-width: 120px;
        }
        .options button.selected-opt {
            background: #3c5da0;
            border-color: #b5d0ff;
            box-shadow: 0 0 8px #6e96ff;
            font-weight: 600;
        }

        .test-actions {
            display: flex;
            gap: 15px;
            margin-top: 28px;
        }
        .test-actions button {
            flex: 1;
            background: #213559;
            border: none;
            padding: 14px 10px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            border: 1px solid #6f93eb;
            cursor: pointer;
        }
        .test-actions button:active {
            background: #2d4680;
        }

        /* 今日内容展示 */
        .result-panel {
            margin: 20px 0;
        }
        .fortune-item {
            background: rgba(14, 25, 48, 0.7);
            border-radius: 28px;
            padding: 18px 22px;
            margin-bottom: 16px;
            border-left: 8px solid #5980d4;
            border-right: 1px solid #3b5da0;
            backdrop-filter: blur(6px);
        }
        .fortune-item .label {
            font-size: 0.8rem;
            color: #b7d0ff;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .fortune-item .content {
            font-size: 1.0rem;
            line-height: 1.5;
            color: #f6f9ff;
            word-break: break-word;
        }
        /* 音乐区域：显示歌名 + 播放器 */
        .music-area {
            background: #1a2746;
            border-radius: 50px;
            padding: 14px 22px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 10px;
            margin: 24px 0 12px;
            border: 1px solid #708ed6;
        }
        .song-name {
            font-size: 1rem;
            color: #d3e5ff;
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid #6080cc;
            backdrop-filter: blur(4px);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .music-area audio {
            width: 100%;
            height: 40px;
            border-radius: 30px;
        }
        .reset-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid #4f72c0;
            color: #d2e0ff;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
        }

        /* 辅助 */
        .hidden {
            display: none !important;
        }
        .text-small {
            font-size: 0.8rem;
            color: #9bb3ec;
            margin-top: 16px;
            text-align: center;
        }
        .disclaimer {
            font-size: 0.7rem;
            opacity: 0.7;
            font-style: italic;
            margin-top: 8px;
            color: #a0b5d9;
        }
        hr {
            border: 0.5px solid #3160a0;
            margin: 20px 0 10px 0;
        }
    </style>
</head>
<body>
    <div class="radio-card" id="appCard">
        <!-- 品牌 -->
        <div class="brand">
            <span class="brand-primary">天线泡泡</span>
            <span class="brand-series">夸夸星电波</span>
        </div>

        <!-- 输入模式/测试模式/结果模式 -->
        <div id="inputMode">
            <div class="section-title">📡 输入你的星电波 <span>MBTI</span></div>
            <div class="mbti-input-area">
                <input type="text" id="mbtiInput" placeholder="例如 INFP" maxlength="4" autocomplete="off">
                <button id="submitMbti">接收电波</button>
            </div>
            <div class="icon-grid" id="mbtiIcons">
                <!-- 16种人格图标 动态生成 -->
            </div>
            <div class="switch-mode">
                <a id="gotoTestLink">🔮 不知道自己的类型？12题快速测试 ➔</a>
            </div>
        </div>

        <div id="testMode" class="hidden">
            <div class="section-title">✨ 12个维度·千禧电波</div>
            <div class="mini-test" id="miniTestContainer">
                <!-- 十二个问题由js动态渲染 -->
            </div>
            <div class="test-actions">
                <button id="backToInput">⬅ 返回</button>
                <button id="runTest">✨ 测出人格</button>
            </div>
        </div>

        <div id="resultMode" class="hidden">
            <div class="section-title">🌠 今日专属运势 · <span id="resultMbtiShow">INFP</span></div>
            <div class="result-panel">
                <div class="fortune-item">
                    <div class="label">📅 人格日历·深度解析</div>
                    <div class="content" id="calendarText">加载中...</div>
                </div>
                <div class="fortune-item">
                    <div class="label">🎁 每日解压盲盒</div>
                    <div class="content" id="blindboxText">加载中...</div>
                </div>
                <div class="fortune-item">
                    <div class="label">🧊 生活冷知识</div>
                    <div class="content" id="coldknowText">加载中...</div>
                </div>
            </div>
            <!-- 音乐播放器 (千禧经典歌名) -->
            <div class="music-area">
                <div class="song-name" id="currentSongName">🎵 加载中...</div>
                <audio id="fortuneMusic" controls>
                    <source src="" type="audio/mpeg">
                </audio>
            </div>
            <button class="reset-btn" id="newQueryBtn">📻 重新调频</button>
        </div>

        <hr>
        <div class="text-small">✨ 碰一碰NFC · 每日0点宇宙刷新 ✨</div>
        <!-- 新增理性参考提示 -->
        <div class="text-small disclaimer">结果仅供娱乐，非专业心理诊断，请理性参考，轻松看待</div>
    </div>

    <script>
        (function() {
            // -------------------- 内容池 (各100条，符合字数要求) --------------------
            const CALENDAR_POOL = [];
            const BLINDBOX_POOL = [];
            const COLDKNOW_POOL = [];

            // ---- 人格日历 (每条约100字) 使用组合生成100条 ---- 
            const startPhrases = [
                "今天你的主导功能处于活跃期，适合深入思考自我价值。",
                "宇宙电波提示：情绪感知力提升，容易与他人产生共鸣。",
                "逻辑与直觉的交汇点，适合解决遗留问题。",
                "外向能量流动顺畅，聚会或团队合作会有意外收获。",
                "内心秩序感增强，整理物品或规划日程能带来安心。",
                "灵感如流星，随时记录那些一闪而过的念头。",
                "身体需要温和运动，散步或拉伸有助于整合思绪。",
                "你对他人的观察力变得敏锐，但不必过度解读。",
                "适合接触艺术或音乐，潜意识会被激活。",
                "决策时多信赖第一感觉，过度分析可能绕远路。",
                "今日小小的仪式感会让你整天发光。",
                "与自然连接的好时机，看看天空或植物。",
                "学习新技能效率高，大脑突触像通了电。",
                "怀旧情绪可能出现，但别停留太久。",
                "对未来的期待值拉满，记得写下三个愿望。",
                "某个旧友可能突然联系，或梦见过去的人。"
            ];
            const middlePhrases = [
                "在工作中，你可能会遇到需要快速反应的状况，保持呼吸平稳。",
                "人际互动里，你的温和态度会化解潜在冲突。",
                "面对选择时，列出优缺点但最终听内心的声音。",
                "创造力比平时旺盛，适合画画或写日记。",
                "注意不要过度承诺，留些时间给自己。",
                "电子设备可能有点小脾气，备份文件更安心。",
                "某个巧合其实是你潜意识吸引来的。",
                "傍晚时分情绪容易波动，吃点甜的安抚一下。",
                "远程沟通容易产生误会，尽量见面或语音。",
                "今天的颜色是浅蓝色或暖橙色，多看看它们。",
                "适合回顾年初定下的目标，调整后半程计划。",
                "模仿能力强，可以学一段舞蹈或新菜谱。",
                "理财直觉在线，但大额投资仍需谨慎。",
                "家人或室友需要你的关注，耐心听听。",
                "睡眠质量影响明天的状态，试试提前半小时熄灯。"
            ];
            const endPhrases = [
                "傍晚适合听一些千禧年经典老歌，怀旧又治愈。",
                "睡前冥想五分钟，能整合一天的灵感。",
                "记住：你今天的存在本身就已经足够美好。",
                "写下一件感恩的小事，它会放大成幸福。",
                "明天可能会有一个小惊喜，保持开放心态。",
                "你的优势类型在今天会吸引志同道合的人。",
                "不要太追求完美，完成比完美更重要。",
                "花点时间照顾绿植或宠物，它们能反馈能量。",
                "看一部老电影或综艺，让大脑放松。",
                "整理手机相册，删除模糊的照片，轻装上阵。"
            ];
            // 笛卡尔积组合出100条 (16*15*4 ≈ 960，取前100条即可)
            for (let s of startPhrases) {
                for (let m of middlePhrases) {
                    for (let e of endPhrases) {
                        if (CALENDAR_POOL.length >= 100) break;
                        CALENDAR_POOL.push(s + m + e);
                    }
                    if (CALENDAR_POOL.length >= 100) break;
                }
                if (CALENDAR_POOL.length >= 100) break;
            }
            while (CALENDAR_POOL.length < 100) CALENDAR_POOL.push("今日电波柔和，适合静心思考，回顾过去一月的成长，并为自己泡一杯茶，让思绪沉淀。傍晚或许有微风，可以出去走走，感受季节变化。你内心的柔软会成为今天的力量。记得对自己说一句：你已经做得很好了。");

            // ---- 解压盲盒 (每条约50字) ---- 
            const blindActs = ["深呼吸三次", "整理一个小角落", "听一首老歌", "闭眼想象海边", "喝一大口温水", "拉伸肩膀", "撕掉过期便签", "给绿植擦灰", "对着镜子笑", "写三个烦恼扔进垃圾桶", "数五十颗米", "闻一闻橙子皮", "原地慢跑两分钟", "摸一摸柔软的织物", "看云两分钟", "哼一段童年旋律"];
            const blindObjects = ["感受心跳", "放空大脑", "想象云朵从头顶飘过", "把焦虑想象成气球放走", "手指轻轻敲桌面", "观察窗外的树", "伸个懒腰", "用非惯用手写字", "吃一颗黑巧克力", "回忆一件今天的小好事", "按下圆珠笔", "听环境白噪音", "摸摸自己的耳朵", "喝点蜂蜜水", "翻几页纸质书"];
            for (let i = 0; i < 100; i++) {
                const a = blindActs[i % blindActs.length];
                const b = blindObjects[(i+7) % blindObjects.length];
                BLINDBOX_POOL.push(`🧘 解压盲盒：${a}，然后${b}。只需1分钟，让神经松弛下来。`);
            }

            // ---- 生活冷知识 (每条约50字) 100条 ---- 
            const coldBase = [
                "💡 冷知识：人在打哈欠时听力会暂时减弱。",
                "🐨 树袋熊一天睡20小时，不是懒，是桉叶有毒需要慢代谢。",
                "🍌 香蕉其实是浆果，而草莓不是。",
                "🐧 企鹅的膝盖藏在羽毛下面，所以走路摇摆。",
                "🌍 地球每天被雷击约860万次。",
                "💧 人的胃酸可以溶解刀片，但千万别尝试。",
                "📸 第一张自拍1839年拍摄，曝光几分钟。",
                "🎈 氦气会让声音变尖，吸入过多危险。",
                "🍯 蜂蜜是唯一不会变质的天然食品。",
                "🐘 大象无法跳跃。",
                "🍿 爆米花在微波炉里爆裂是因为内部水分变成蒸汽。",
                "🧊 冰激凌最早是中国古代用冰和牛奶制成的。",
                "🐱 猫的耳朵可以独立旋转180度。",
                "🧦 穿两只不同颜色的袜子能提高心情敏感度。",
                "📞 手机上的细菌比马桶圈多十倍。",
                "🌌 我们肉眼看到的星星其实是几百万年前的光。",
                "🎵 听悲伤的音乐会让大脑释放催乳素，产生安慰感。",
                "🦷 牙齿是人体唯一不能自愈的部位。",
                "💤 人在做梦时身体会麻痹，防止伤害自己。",
                "🚿 淋浴时的歌声更好听，因为浴室混响。",
                "🍫 黑巧克力能提高大脑血流，让人更清醒。",
                "🐌 蜗牛可以连续睡三年。",
                "🌿 闻薄荷能提高注意力。",
                "🪑 长时间坐着，臀部肌肉会“忘记”怎么发力。",
                "☕ 咖啡的香气就能让人减轻压力。",
                "🧠 大脑在冬天更耗能，因为要保持体温。",
                "🕰️ 熬夜后第二天的时间感知会变慢。",
                "👀 人眼能分辨约1000万种颜色。",
                "🎨 梵高生前只卖出一幅画。",
                "🌊 海水是蓝色的因为水吸收红光，反射蓝光。"
            ];
            for (let i = 0; i < 100; i++) {
                COLDKNOW_POOL.push(coldBase[i % coldBase.length] + "（每日一个奇怪小知识）");
            }

            // -------------------- 2000年左右经典曲目100首 (歌名替换，URL复用SoundHelix) --------------------
            const classicSongsBase = [
                "后来 - 刘若英", "遇见 - 孙燕姿", "十年 - 陈奕迅", "七里香 - 周杰伦", "黄昏 - 周传雄",
                "童话 - 光良", "天黑黑 - 孙燕姿", "勇气 - 梁静茹", "Lydia - F.I.R.", "杀破狼 - JS",
                "欧若拉 - 张韶涵", "快乐崇拜 - 潘玮柏", "江南 - 林俊杰", "爱情转移 - 陈奕迅", "隐形的翅膀 - 张韶涵",
                "日不落 - 蔡依林", "青花瓷 - 周杰伦", "该死的温柔 - 马天宇", "老人与海 - 海鸣威", "当你孤单你会想起谁 - 张栋梁",
                "笔记 - 周笔畅", "醉清风 - 弦子", "寂寞沙洲冷 - 周传雄", "一千个伤心的理由 - 张学友", "吻别 - 张学友",
                "心如刀割 - 张学友", "她来听我的演唱会 - 张学友", "如果这都不算爱 - 张学友", "你的样子 - 罗大佑", "恋曲1990 - 罗大佑",
                "花心 - 周华健", "朋友 - 周华健", "孤勇者 - 陈奕迅", "红日 - 李克勤", "月半小夜曲 - 李克勤",
                "海阔天空 - Beyond", "光辉岁月 - Beyond", "真的爱你 - Beyond", "加州旅馆 - 老鹰乐队", "My Heart Will Go On - Celine Dion",
                "I Believe I Can Fly - R.Kelly", "Hero - Mariah Carey", "Bye Bye Bye - *NSYNC", "Larger Than Life - Backstreet Boys", "Baby One More Time - Britney Spears",
                "Oops!... I Did It Again - Britney Spears", "It's Gonna Be Me - *NSYNC", "Shape of My Heart - Backstreet Boys", "I Want It That Way - Backstreet Boys", "Everybody - Backstreet Boys"
            ];
            const MUSIC_TRACKS = [];
            for (let i = 0; i < 100; i++) {
                let baseName = classicSongsBase[i % classicSongsBase.length];
                let suffix = Math.floor(i / classicSongsBase.length) + 1;
                let trackName = suffix > 1 ? `${baseName} (演奏${suffix}版)` : baseName;
                const songNumber = (i % 15) + 1;
                const url = `https://www.soundhelix.com/examples/mp3/SoundHelix-Song-${songNumber}.mp3`;
                MUSIC_TRACKS.push({ name: trackName, url: url });
            }

            // 所有有效MBTI列表
            const MBTI_TYPES = [
                "INFP", "INFJ", "INTP", "INTJ", "ISFP", "ISFJ", "ISTP", "ISTJ",
                "ENFP", "ENFJ", "ENTP", "ENTJ", "ESFP", "ESFJ", "ESTP", "ESTJ"
            ];

            // ---------- DOM 元素 ----------
            const inputMode = document.getElementById('inputMode');
            const testMode = document.getElementById('testMode');
            const resultMode = document.getElementById('resultMode');
            const mbtiInput = document.getElementById('mbtiInput');
            const submitBtn = document.getElementById('submitMbti');
            const iconGrid = document.getElementById('mbtiIcons');
            const gotoTestLink = document.getElementById('gotoTestLink');
            const backToInput = document.getElementById('backToInput');
            const runTest = document.getElementById('runTest');
            const newQueryBtn = document.getElementById('newQueryBtn');
            const miniTestContainer = document.getElementById('miniTestContainer');
            const resultMbtiSpan = document.getElementById('resultMbtiShow');
            const calendarText = document.getElementById('calendarText');
            const blindboxText = document.getElementById('blindboxText');
            const coldknowText = document.getElementById('coldknowText');
            const musicAudio = document.getElementById('fortuneMusic');
            const currentSongName = document.getElementById('currentSongName');

            // 12个问题的答案存储
            let testAnswers = new Array(12).fill(null); // 每个元素存储选中的字母 I/E/S/N/T/F/J/P

            // ---------- 随机渐变背景 ----------
            function setRandomGradient() {
                const hue1 = Math.floor(Math.random() * 360);
                const hue2 = (hue1 + 40 + Math.floor(Math.random() * 60)) % 360;
                const hue3 = (hue2 + 30) % 360;
                document.body.style.background = `radial-gradient(circle at 30% 30%, hsl(${hue1}, 80%, 55%), hsl(${hue2}, 75%, 30%), hsl(${hue3}, 85%, 18%))`;
            }
            setRandomGradient();

            // ---------- 构建16个MBTI图标 ----------
            function renderIcons() {
                iconGrid.innerHTML = '';
                MBTI_TYPES.forEach(type => {
                    const div = document.createElement('div');
                    div.className = 'mbti-icon';
                    div.textContent = type;
                    div.dataset.type = type;
                    div.addEventListener('click', () => {
                        document.querySelectorAll('.mbti-icon').forEach(ic => ic.classList.remove('selected'));
                        div.classList.add('selected');
                        mbtiInput.value = type;
                    });
                    iconGrid.appendChild(div);
                });
            }
            renderIcons();

            // ---------- 渲染12个测试题目 (每个维度3题，共12题) ----------
            function renderMiniTest() {
                const questions = [
                    // EI 维度 3题
                    { text: "① 在社交场合中，你更倾向于？", optA: "独自待在角落 (I)", valA: "I", optB: "和大家热络交流 (E)", valB: "E" },
                    { text: "② 周末你更喜欢？", optA: "和朋友聚会 (E)", valA: "E", optB: "宅家看书/打游戏 (I)", valB: "I" },
                    { text: "③ 你通常被认为是？", optA: "比较安静的人 (I)", valA: "I", optB: "比较健谈的人 (E)", valB: "E" },
                    // SN 维度 3题
                    { text: "④ 学习新东西时，你更关注？", optA: "具体事实和步骤 (S)", valA: "S", optB: "概念和原理 (N)", valB: "N" },
                    { text: "⑤ 描述一个物品，你通常？", optA: "描述它的外观细节 (S)", valA: "S", optB: "描述它的象征意义 (N)", valB: "N" },
                    { text: "⑥ 你更容易记住？", optA: "具体的日期和事件 (S)", valA: "S", optB: "大概的印象和感觉 (N)", valB: "N" },
                    // TF 维度 3题
                    { text: "⑦ 做决定时，你更依赖？", optA: "逻辑分析 (T)", valA: "T", optB: "个人感受 (F)", valB: "F" },
                    { text: "⑧ 看到别人难过，你先会？", optA: "想办法解决问题 (T)", valA: "T", optB: "安慰情绪 (F)", valB: "F" },
                    { text: "⑨ 在评价事物时，你更看重？", optA: "对错与公平 (T)", valA: "T", optB: "和谐与人情 (F)", valB: "F" },
                    // JP 维度 3题
                    { text: "⑩ 你喜欢的生活方式？", optA: "计划有序 (J)", valA: "J", optB: "随性灵活 (P)", valB: "P" },
                    { text: "⑪ 对于截止日期，你通常？", optA: "提前完成 (J)", valA: "J", optB: "最后冲刺 (P)", valB: "P" },
                    { text: "⑫ 你的桌面或房间通常？", optA: "整洁有条理 (J)", valA: "J", optB: "有点乱但自己找得到东西 (P)", valB: "P" }
                ];

                let htmlStr = '';
                questions.forEach((q, index) => {
                    htmlStr += `<div class="question"><p>${q.text}</p><div class="options" id="q${index}opts">`;
                    htmlStr += `<button data-q="${index}" data-val="${q.valA}">${q.optA}</button>`;
                    htmlStr += `<button data-q="${index}" data-val="${q.valB}">${q.optB}</button>`;
                    htmlStr += `</div></div>`;
                });
                miniTestContainer.innerHTML = htmlStr;

                // 绑定事件
                document.querySelectorAll('.options button').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const qIdx = parseInt(e.target.dataset.q);
                        const val = e.target.dataset.val;
                        // 移除同组兄弟的高亮
                        const parent = e.target.parentElement;
                        parent.querySelectorAll('button').forEach(b => b.classList.remove('selected-opt'));
                        e.target.classList.add('selected-opt');
                        testAnswers[qIdx] = val; // 存储字母
                    });
                });
            }
            renderMiniTest();

            // ---------- 工具函数: 根据日期+人格生成伪随机索引 ----------
            function getDailySeed(mbti) {
                const today = new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD
                const raw = today + '_' + mbti;
                let hash = 0;
                for (let i = 0; i < raw.length; i++) {
                    hash = ((hash << 5) - hash) + raw.charCodeAt(i);
                    hash |= 0;
                }
                return Math.abs(hash);
            }

            function getTodaysContent(mbti) {
                const seed = getDailySeed(mbti);
                const calIdx = seed % 100;
                const boxIdx = (seed + 31) % 100;
                const coldIdx = (seed + 73) % 100;
                return {
                    calendar: CALENDAR_POOL[calIdx],
                    blindbox: BLINDBOX_POOL[boxIdx],
                    coldknow: COLDKNOW_POOL[coldIdx],
                    musicIdx: seed % MUSIC_TRACKS.length
                };
            }

            function setMusicAndPlay(index) {
                const track = MUSIC_TRACKS[index];
                musicAudio.src = track.url + '?v=' + Date.now();
                musicAudio.load();
                if (currentSongName) currentSongName.textContent = `🎵 ${track.name}`;
                musicAudio.play().catch(e => console.log('自动播放被阻止', e));
            }

            function showResultForMbti(mbti) {
                const cleanMbti = mbti.trim().toUpperCase();
                if (!MBTI_TYPES.includes(cleanMbti)) {
                    alert('请输入正确的MBTI格式 (例如 INFP, ENTJ)');
                    return false;
                }

                const content = getTodaysContent(cleanMbti);
                resultMbtiSpan.textContent = cleanMbti;
                calendarText.textContent = content.calendar;
                blindboxText.textContent = content.blindbox;
                coldknowText.textContent = content.coldknow;
                setMusicAndPlay(content.musicIdx);

                inputMode.classList.add('hidden');
                testMode.classList.add('hidden');
                resultMode.classList.remove('hidden');
                return true;
            }

            function goToInput() {
                inputMode.classList.remove('hidden');
                testMode.classList.add('hidden');
                resultMode.classList.add('hidden');
                // 重置测试答案
                testAnswers = new Array(12).fill(null);
                document.querySelectorAll('.options button').forEach(b => b.classList.remove('selected-opt'));
                // 取消图标选中
                document.querySelectorAll('.mbti-icon').forEach(ic => ic.classList.remove('selected'));
                mbtiInput.value = '';
                // 暂停音乐
                musicAudio.pause();
                musicAudio.currentTime = 0;
                if (currentSongName) currentSongName.textContent = '🎵 加载中...';
            }

            // ---------- 事件绑定 ----------
            submitBtn.addEventListener('click', () => {
                const val = mbtiInput.value.trim();
                if (val) showResultForMbti(val);
                else alert('输入或选择一个MBTI类型');
            });

            gotoTestLink.addEventListener('click', () => {
                inputMode.classList.add('hidden');
                testMode.classList.remove('hidden');
            });

            backToInput.addEventListener('click', goToInput);

            runTest.addEventListener('click', () => {
                if (testAnswers.includes(null)) {
                    alert('请回答全部12个问题~');
                    return;
                }
                // 统计各维度得分
                let cntE = 0, cntI = 0, cntS = 0, cntN = 0, cntT = 0, cntF = 0, cntJ = 0, cntP = 0;
                testAnswers.forEach((val) => {
                    if (val === 'E') cntE++;
                    else if (val === 'I') cntI++;
                    else if (val === 'S') cntS++;
                    else if (val === 'N') cntN++;
                    else if (val === 'T') cntT++;
                    else if (val === 'F') cntF++;
                    else if (val === 'J') cntJ++;
                    else if (val === 'P') cntP++;
                });
                // 每个维度3题，平局时给默认倾向：I,N,F,J
                const ei = cntE === cntI ? 'I' : (cntE > cntI ? 'E' : 'I');
                const sn = cntS === cntN ? 'N' : (cntS > cntN ? 'S' : 'N');
                const tf = cntT === cntF ? 'F' : (cntT > cntF ? 'T' : 'F');
                const jp = cntJ === cntP ? 'J' : (cntJ > cntP ? 'J' : 'P');
                const mbtiResult = ei + sn + tf + jp;
                // 确保有效，若无效则默认INFP
                let finalMbti = mbtiResult;
                if (!MBTI_TYPES.includes(finalMbti)) {
                    finalMbti = 'INFP';
                }
                showResultForMbti(finalMbti);
            });

            newQueryBtn.addEventListener('click', goToInput);

            mbtiInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') submitBtn.click();
            });

        })();
    </script>
</body>
