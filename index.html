<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>夸夸星电波 · 天线泡泡 (人格调频)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            transition: background 0.5s ease;
        }

        .radio-card {
            max-width: 420px;
            width: 100%;
            background: rgba(22, 28, 46, 0.7);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(150, 190, 255, 0.3);
            border-radius: 42px;
            padding: 28px 22px;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(210, 230, 255, 0.15) inset;
            color: #f0f3ff;
            transition: border-color 0.4s, box-shadow 0.4s;
        }

        .brand {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .brand-primary {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd7b0, #c0e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #7ea5ff66;
        }
        .brand-series {
            font-size: 1.1rem;
            color: #aac8ff;
            background: rgba(16, 30, 58, 0.6);
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid #7b9eff55;
            backdrop-filter: blur(4px);
        }

        .section-title {
            font-size: 1.05rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0 14px 0;
            color: #bbd6ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title span {
            background: #2e3f66;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.8rem;
            color: #d3e2ff;
        }

        .mbti-input-area {
            background: rgba(8, 18, 36, 0.7);
            border-radius: 40px;
            padding: 8px 8px 8px 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            border: 1px solid #4065b055;
            margin-bottom: 12px;
        }
        .mbti-input-area input {
            flex: 2 1 150px;
            background: transparent;
            border: none;
            padding: 14px 6px;
            font-size: 1.1rem;
            color: #fff;
            outline: none;
            min-width: 130px;
        }
        .mbti-input-area input::placeholder {
            color: #7f99cc;
            font-size: 0.95rem;
        }
        .mbti-input-area button {
            background: linear-gradient(145deg, #4b6eb0, #253a6b);
            border: none;
            padding: 12px 26px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            font-size: 1rem;
            box-shadow: 0 5px 0 #121f3a, 0 6px 14px #00000080;
            cursor: pointer;
            transition: 0.07s ease;
            border: 1px solid #88adff;
        }
        .mbti-input-area button:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #121f3a, 0 6px 12px #00000060;
        }

        .icon-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 16px 0 8px;
        }
        .mbti-icon {
            background: rgba(16, 28, 48, 0.8);
            border: 1px solid #577bce;
            color: #c7dbff;
            width: 48px;
            height: 48px;
            border-radius: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.1s ease;
            backdrop-filter: blur(6px);
        }
        .mbti-icon.selected {
            background: #3f60a5;
            color: white;
            border-color: #b1d0ff;
            box-shadow: 0 0 12px #6190ff;
        }

        .switch-mode {
            text-align: center;
            margin: 18px 0 10px;
        }
        .switch-mode a {
            color: #aac3ff;
            text-decoration: underline 1px dotted;
            font-size: 0.95rem;
            cursor: pointer;
            padding: 8px 16px;
            display: inline-block;
        }

            background: rgba(6, 15, 30, 0.6);
            border-radius: 34px;
            padding: 22px 18px;
            border: 1px solid #4d71b0;
            margin: 20px 0;
            max-height: 450px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #4d71b0 #0e1a2c;
        }
        .mini-test::-webkit-scrollbar {
            width: 5px;
        }
        .mini-test::-webkit-scrollbar-track {
            background: #0e1a2c;
        }
        .mini-test::-webkit-scrollbar-thumb {
            background: #4d71b0;
            border-radius: 10px;
        }
        .question {
            margin: 18px 0;
        }
        .question p {
            margin-bottom: 12px;
            font-weight: 400;
            color: #c6d6ff;
        }
        .options {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .options button {
            background: #1d2c4a;
            border: 1px solid #5c7ec9;
            color: #dfebff;
            padding: 12px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            flex: 1 0 auto;
            cursor: pointer;
            transition: 0.1s;
            min-width: 120px;
        }
        .options button.selected-opt {
            background: #3c5da0;
            border-color: #b5d0ff;
            box-shadow: 0 0 8px #6e96ff;
            font-weight: 600;
        }

        .test-actions {
            display: flex;
            gap: 15px;
            margin-top: 28px;
        }
        .test-actions button {
            flex: 1;
            background: #213559;
            border: none;
            padding: 14px 10px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            border: 1px solid #6f93eb;
            cursor: pointer;
        }
        .test-actions button:active {
            background: #2d4680;
        }

        .result-panel {
            margin: 20px 0;
        }
        .fortune-item {
            background: rgba(14, 25, 48, 0.7);
            border-radius: 28px;
            padding: 18px 22px;
            margin-bottom: 16px;
            border-left: 8px solid #5980d4;
            border-right: 1px solid #3b5da0;
            backdrop-filter: blur(6px);

            font-size: 0.8rem;
            color: #b7d0ff;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .fortune-item .content {
            font-size: 1.0rem;
            line-height: 1.5;
            color: #f6f9ff;
            word-break: break-word;
        }
        .music-area {
            background: #1a2746;
            border-radius: 50px;
            padding: 14px 22px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 10px;
            margin: 24px 0 12px;
            border: 1px solid #708ed6;
        }
        .daily-color {
            font-size: 1.2rem;
            font-weight: 500;
            color: #f0f6ff;
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid #6080cc;
            backdrop-filter: blur(4px);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .music-area audio {
            width: 100%;
            height: 40px;
            border-radius: 30px;
        }
        .reset-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid #4f72c0;
            color: #d2e0ff;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
        }

        .hidden {
            display: none !important;
        }
        .text-small {
            font-size: 0.8rem;
            color: #9bb3ec;
            margin-top: 16px;
            text-align: center;
        }
        .disclaimer {
            font-size: 0.7rem;
            opacity: 0.7;
            font-style: italic;
            margin-top: 8px;
            color: #a0b5d9;
        }
        hr {
            border: 0.5px solid #3160a0;
            margin: 20px 0 10px 0;
        }
    </style>
</head>
<body>
    <div class="radio-card" id="appCard">

                <audio id="fortuneMusic" controls>

                "去跳蚤市场摆摊，和不同人讨价还价。",
                "参加一场辩论会/脱口秀开放麦。",
                "主动和咖啡馆老板聊天，了解开店的故事。",
                "发起一次「快问快答」街头采访。",
                "组织一场陌生人读书分享会。",
                "去KTV开一个房间，邀请朋友或陌生人一起唱歌。",
                "在公园组织一次放风筝比赛。",
                "参加志愿者活动，认识新伙伴。",
                "策划一次惊喜派对给某个朋友。",
                "在社交平台发起一个话题挑战。",
                "去电玩城和陌生人比赛投篮。",
                "主动帮邻居遛狗，并和狗主人聊天。",
                "报名参加一场城市定向越野。",
                "在火车站/机场举着“免费拥抱”的牌子（注意安全）。",
                "组织一次深夜骑行小队。",
                "去迪厅/舞池尝试跟着音乐自由舞动。"
            ];
            // 两个池都已足够丰富，无需填充

            // ---------- 3. 音乐池 (100首) ----------
            const BASE_URLS = [
                "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
                "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
                "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
                "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3",
                "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3",
                "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3",
                "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3",
                "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3",
                "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-9.mp3",
                "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3",
                "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-11.mp3",
                "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-12.mp3",
                "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-13.mp3",
                "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-14.mp3",
                "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3"
            ];
            const MUSIC_URLS = [];
            for (let i = 0; i < 100; i++) {
                MUSIC_URLS.push(BASE_URLS[i % BASE_URLS.length] + "?v=" + i);
            }

            // ---------- 4. MBTI 颜色映射 ----------
            const MBTI_HUES = {
                "INFP": 180, "INFJ": 170, "INTP": 200, "INTJ": 210,
                "ISFP": 50, "ISFJ": 40, "ISTP": 30, "ISTJ": 20,
                "ENFP": 80, "ENFJ": 90, "ENTP": 100, "ENTJ": 110,
                "ESFP": 350, "ESFJ": 0, "ESTP": 10, "ESTJ": 15
            };
            const COLOR_NAMES = {
                0: "热情红", 30: "暖橙", 60: "芒果黄", 90: "嫩绿", 120: "翠绿",
                150: "薄荷", 180: "湖水绿", 210: "湛蓝", 240: "黛紫", 270: "罗兰",
                300: "粉红", 330: "珊瑚", 360: "朱红"
            };
            function getColorNameFromHue(h) {
                let closest = 0, minDiff = 180;
                for (let hue in COLOR_NAMES) {
                    let diff = Math.abs(h - parseInt(hue));
                    diff = Math.min(diff, 360-diff);
                    if (diff < minDiff) { minDiff = diff; closest = parseInt(hue); }
                }
                return COLOR_NAMES[closest];
            }

            // 有效MBTI列表
            const MBTI_TYPES = [
                "INFP", "INFJ", "INTP", "INTJ", "ISFP", "ISFJ", "ISTP", "ISTJ",
                "ENFP", "ENFJ", "ENTP", "ENTJ", "ESFP", "ESFJ", "ESTP", "ESTJ"
            ];

            // DOM 元素
            const inputMode = document.getElementById('inputMode');
            const testMode = document.getElementById('testMode');
            const resultMode = document.getElementById('resultMode');
            const mbtiInput = document.getElementById('mbtiInput');
            const submitBtn = document.getElementById('submitMbti');
            const iconGrid = document.getElementById('mbtiIcons');
            const gotoTestLink = document.getElementById('gotoTestLink');
            const backToInput = document.getElementById('backToInput');
            const runTest = document.getElementById('runTest');
            const newQueryBtn = document.getElementById('newQueryBtn');
            const miniTestContainer = document.getElementById('miniTestContainer');
            const resultMbtiSpan = document.getElementById('resultMbtiShow');
            const calendarText = document.getElementById('calendarText');
            const blindboxText = document.getElementById('blindboxText');
            const coldknowText = document.getElementById('coldknowText');
            const musicAudio = document.getElementById('fortuneMusic');
            const dailyColorSpan = document.getElementById('dailyColorSpan');

            let testAnswers = new Array(12).fill(null);

            // 渲染图标
            function renderIcons() {
                iconGrid.innerHTML = '';
                MBTI_TYPES.forEach(type => {
                    const div = document.createElement('div');
                    div.className = 'mbti-icon';
                    div.textContent = type;
                    div.dataset.type = type;
                    div.addEventListener('click', () => {
                        document.querySelectorAll('.mbti-icon').forEach(ic => ic.classList.remove('selected'));
                        div.classList.add('selected');
                        mbtiInput.value = type;
                    });
                    iconGrid.appendChild(div);
                });
            }
            renderIcons();

            // 渲染测试题
            function renderMiniTest() {
                const questions = [
                    { text: "① 在社交场合中，你更倾向于？", optA: "独自待在角落 (I)", valA: "I", optB: "和大家热络交流 (E)", valB: "E" },
                    { text: "② 周末你更喜欢？", optA: "和朋友聚会 (E)", valA: "E", optB: "宅家看书/打游戏 (I)", valB: "I" },
                    { text: "③ 你通常被认为是？", optA: "比较安静的人 (I)", valA: "I", optB: "比较健谈的人 (E)", valB: "E" },
                    { text: "④ 学习新东西时，你更关注？", optA: "具体事实和步骤 (S)", valA: "S", optB: "概念和原理 (N)", valB: "N" },
                    { text: "⑤ 描述一个物品，你通常？", optA: "描述它的外观细节 (S)", valA: "S", optB: "描述它的象征意义 (N)", valB: "N" },
                    { text: "⑥ 你更容易记住？", optA: "具体的日期和事件 (S)", valA: "S", optB: "大概的印象和感觉 (N)", valB: "N" },
                    { text: "⑦ 做决定时，你更依赖？", optA: "逻辑分析 (T)", valA: "T", optB: "个人感受 (F)", valB: "F" },
                    { text: "⑧ 看到别人难过，你先会？", optA: "想办法解决问题 (T)", valA: "T", optB: "安慰情绪 (F)", valB: "F" },
                    { text: "⑨ 在评价事物时，你更看重？", optA: "对错与公平 (T)", valA: "T", optB: "和谐与人情 (F)", valB: "F" },
                    { text: "⑩ 你喜欢的生活方式？", optA: "计划有序 (J)", valA: "J", optB: "随性灵活 (P)", valB: "P" },
                    { text: "⑪ 对于截止日期，你通常？", optA: "提前完成 (J)", valA: "J", optB: "最后冲刺 (P)", valB: "P" },
                    { text: "⑫ 你的桌面或房间通常？", optA: "整洁有条理 (J)", valA: "J", optB: "有点乱但自己找得到东西 (P)", valB: "P" }
                ];
                let htmlStr = '';
                questions.forEach((q, index) => {
                    htmlStr += `<div class="question"><p>${q.text}</p><div class="options" id="q${index}opts">`;
                    htmlStr += `<button data-q="${index}" data-val="${q.valA}">${q.optA}</button>`;
                    htmlStr += `<button data-q="${index}" data-val="${q.valB}">${q.optB}</button>`;
                    htmlStr += `</div></div>`;
                });
                miniTestContainer.innerHTML = htmlStr;
                document.querySelectorAll('.options button').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const qIdx = parseInt(e.target.dataset.q);
                        const val = e.target.dataset.val;
                        const parent = e.target.parentElement;
                        parent.querySelectorAll('button').forEach(b => b.classList.remove('selected-opt'));
                        e.target.classList.add('selected-opt');
                        testAnswers[qIdx] = val;
                    });
                });
            }
            renderMiniTest();

            // 每日种子
            function getDailySeed(mbti) {
                const today = new Date().toLocaleDateString('en-CA');
                const raw = today + '_' + mbti;
                let hash = 0;
                for (let i = 0; i < raw.length; i++) {
                    hash = ((hash << 5) - hash) + raw.charCodeAt(i);
                    hash |= 0;
                }
                return Math.abs(hash);
            }

            // 人格日历静态池 (100条)
            const CALENDAR_POOL = [];
            const startPhrases = ["今天你的主导功能处于活跃期，适合深入思考自我价值。","宇宙电波提示：情绪感知力提升，容易与他人产生共鸣。","逻辑与直觉的交汇点，适合解决遗留问题。","外向能量流动顺畅，聚会或团队合作会有意外收获。","内心秩序感增强，整理物品或规划日程能带来安心。","灵感如流星，随时记录那些一闪而过的念头。","身体需要温和运动，散步或拉伸有助于整合思绪。","你对他人的观察力变得敏锐，但不必过度解读。","适合接触艺术或音乐，潜意识会被激活。","决策时多信赖第一感觉，过度分析可能绕远路。","今日小小的仪式感会让你整天发光。","与自然连接的好时机，看看天空或植物。","学习新技能效率高，大脑突触像通了电。","怀旧情绪可能出现，但别停留太久。","对未来的期待值拉满，记得写下三个愿望。","某个旧友可能突然联系，或梦见过去的人。"];
            const middlePhrases = ["在工作中，你可能会遇到需要快速反应的状况，保持呼吸平稳。","人际互动里，你的温和态度会化解潜在冲突。","面对选择时，列出优缺点但最终听内心的声音。","创造力比平时旺盛，适合画画或写日记。","注意不要过度承诺，留些时间给自己。","电子设备可能有点小脾气，备份文件更安心。","某个巧合其实是你潜意识吸引来的。","傍晚时分情绪容易波动，吃点甜的安抚一下。","远程沟通容易产生误会，尽量见面或语音。","今天的颜色是浅蓝色或暖橙色，多看看它们。","适合回顾年初定下的目标，调整后半程计划。","模仿能力强，可以学一段舞蹈或新菜谱。","理财直觉在线，但大额投资仍需谨慎。","家人或室友需要你的关注，耐心听听。","睡眠质量影响明天的状态，试试提前半小时熄灯。"];
            const endPhrases = ["傍晚适合听一些舒缓的纯音乐，让思绪沉淀。","睡前冥想五分钟，能整合一天的灵感。","记住：你今天的存在本身就已经足够美好。","写下一件感恩的小事，它会放大成幸福。","明天可能会有一个小惊喜，保持开放心态。","你的优势类型在今天会吸引志同道合的人。","不要太追求完美，完成比完美更重要。","花点时间照顾绿植或宠物，它们能反馈能量。","看一部老电影或综艺，让大脑放松。","整理手机相册，删除模糊的照片，轻装上阵。"];
            for (let s of startPhrases) for (let m of middlePhrases) for (let e of endPhrases) { if (CALENDAR_POOL.length >= 100) break; CALENDAR_POOL.push(s + m + e); }
            while (CALENDAR_POOL.length < 100) CALENDAR_POOL.push("今日电波柔和，适合静心思考，回顾过去一月的成长，并为自己泡一杯茶，让思绪沉淀。傍晚或许有微风，可以出去走走，感受季节变化。你内心的柔软会成为今天的力量。记得对自己说一句：你已经做得很好了。");

            // 根据人格生成今日内容 (盲盒只包含活动)
            function getTodaysContent(mbti) {
                const seed = getDailySeed(mbti);
                const calIdx = seed % 100;
                const coldIdx = (seed + 73) % 100;
                const firstLetter = mbti[0];
                const activityPool = firstLetter === 'I' ? introActivities : extroActivities;
                const actIdx = seed % activityPool.length;
                const activity = activityPool[actIdx];

                return {
                    calendar: CALENDAR_POOL[calIdx],
                    blindbox: activity,   // 只保留活动
                    coldknow: COLDKNOW_POOL[coldIdx],
                    musicIdx: seed % MUSIC_URLS.length,
                    seed: seed
                };
            }

            // 设置界面颜色
            function applyColorForMbti(mbti, seed) {
                const baseHue = MBTI_HUES[mbti] || 200;
                const hueOffset = (seed % 30) - 15;
                let finalHue = (baseHue + hueOffset + 360) % 360;
                const sat1 = 70 + (seed % 20);
                const light1 = 55 + (seed % 15);
                const sat2 = 65 + (seed % 25);
                const light2 = 35 + (seed % 15);
                document.body.style.background = `radial-gradient(circle at 30% 30%, hsl(${finalHue}, ${sat1}%, ${light1}%), hsl(${(finalHue+40)%360}, ${sat2}%, ${light2}%))`;
                const card = document.querySelector('.radio-card');
                if (card) card.style.borderColor = `hsl(${finalHue}, 70%, 60%)`;
                return getColorNameFromHue(finalHue);
            }

            function setMusicAndColor(mbti, musicIdx, seed) {
                musicAudio.src = MUSIC_URLS[musicIdx] + '&t=' + Date.now();
                musicAudio.load();
                musicAudio.play().catch(e => console.log('自动播放被阻止'));
                const colorName = applyColorForMbti(mbti, seed);
                dailyColorSpan.textContent = `🎨 今日幸运色 · ${colorName}`;
            }

            function showResultForMbti(mbti) {
                const cleanMbti = mbti.trim().toUpperCase();
                if (!MBTI_TYPES.includes(cleanMbti)) {
                    alert('请输入正确的MBTI格式 (例如 INFP, ENTJ)');
                    return false;
                }
                const content = getTodaysContent(cleanMbti);
                resultMbtiSpan.textContent = cleanMbti;
                calendarText.textContent = content.calendar;
                blindboxText.textContent = content.blindbox;
                coldknowText.textContent = content.coldknow;
                setMusicAndColor(cleanMbti, content.musicIdx, content.seed);

                inputMode.classList.add('hidden');
                testMode.classList.add('hidden');
                resultMode.classList.remove('hidden');
                return true;
            }

            function goToInput() {
                inputMode.classList.remove('hidden');
                testMode.classList.add('hidden');
                resultMode.classList.add('hidden');
                testAnswers = new Array(12).fill(null);
                document.querySelectorAll('.options button').forEach(b => b.classList.remove('selected-opt'));
                document.querySelectorAll('.mbti-icon').forEach(ic => ic.classList.remove('selected'));
                mbtiInput.value = '';
                musicAudio.pause();
                musicAudio.currentTime = 0;
                dailyColorSpan.textContent = '🎨 加载今日颜色...';
                // 恢复初始随机渐变和卡片边框
                setRandomGradient();
                const card = document.querySelector('.radio-card');
                if (card) card.style.borderColor = 'rgba(150, 190, 255, 0.3)';
            }

            // 事件绑定
            submitBtn.addEventListener('click', () => {
                const val = mbtiInput.value.trim();
                if (val) showResultForMbti(val);
                else alert('输入或选择一个MBTI类型');
            });
            gotoTestLink.addEventListener('click', () => {
                inputMode.classList.add('hidden');
                testMode.classList.remove('hidden');
            });
            backToInput.addEventListener('click', goToInput);
            runTest.addEventListener('click', () => {
                if (testAnswers.includes(null)) {
                    alert('请回答全部12个问题~');
                    return;
                }
                let cntE=0,cntI=0,cntS=0,cntN=0,cntT=0,cntF=0,cntJ=0,cntP=0;
                testAnswers.forEach(v => {
                    if (v==='E') cntE++; else if (v==='I') cntI++;
                    else if (v==='S') cntS++; else if (v==='N') cntN++;
                    else if (v==='T') cntT++; else if (v==='F') cntF++;
                    else if (v==='J') cntJ++; else if (v==='P') cntP++;
                });
                const ei = cntE === cntI ? 'I' : (cntE > cntI ? 'E' : 'I');
                const sn = cntS === cntN ? 'N' : (cntS > cntN ? 'S' : 'N');
                const tf = cntT === cntF ? 'F' : (cntT > cntF ? 'T' : 'F');
                const jp = cntJ === cntP ? 'J' : (cntJ > cntP ? 'J' : 'P');
                let mbtiResult = ei + sn + tf + jp;
                if (!MBTI_TYPES.includes(mbtiResult)) mbtiResult = 'INFP';
                showResultForMbti(mbtiResult);
            });
            newQueryBtn.addEventListener('click', goToInput);
            mbtiInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') submitBtn.click(); });
        })();
    </script>
</body>
</html>
